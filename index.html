<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Applied Physics Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1b2a;
  --indigo: #1e3a5f;
  --blue: #1565c0;
  --blue-light: #42a5f5;
  --gold: #f9a825;
  --gold-light: #ffe082;
  --red: #ef4444;
  --green: #10b981;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 80px;
}
.bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.15; animation: drift 14s ease-in-out infinite alternate; }
.orb1 { width: 600px; height: 600px; background: #1565c0; top: -150px; left: -150px; }
.orb2 { width: 450px; height: 450px; background: #0d47a1; top: 35%; right: -100px; animation-delay: 4s; }
.orb3 { width: 350px; height: 350px; background: #f9a825; bottom: 5%; left: 25%; animation-delay: 7s; opacity: 0.08; }
@keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(35px,45px) scale(1.09)} }

.sticky {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: rgba(13,27,42,0.93); backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(21,101,192,0.35); padding: 10px 20px;
}
.sticky-inner { max-width: 820px; margin: 0 auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.pill { padding: 5px 14px; border-radius: 20px; font-size: .8em; font-weight: 600; white-space: nowrap; }
.pill-q { background: rgba(255,255,255,.1); color: #e2e8f0; border: 1px solid rgba(255,255,255,.2); }
.pill-c { background: rgba(16,185,129,.2); color: #6ee7b7; border: 1px solid #10b981; }
.pill-w { background: rgba(239,68,68,.2); color: #fca5a5; border: 1px solid #ef4444; }
.pill-p { background: rgba(249,168,37,.2); color: #ffe082; border: 1px solid #f9a825; }
.prog-wrap { flex:1; background: rgba(255,255,255,.1); border-radius: 8px; height: 6px; min-width: 60px; overflow: hidden; }
.prog-fill { background: linear-gradient(90deg, var(--blue), var(--blue-light)); height: 100%; border-radius: 8px; transition: width .5s; }

#startScreen { position: relative; z-index: 1; max-width: 680px; margin: 100px auto 0; padding: 20px; }
.start-card {
  background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
  border: 1px solid rgba(21,101,192,0.45); border-radius: 24px; padding: 44px 40px;
  box-shadow: 0 40px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,0.08);
}
.cross-icon {
  font-size: 3.5em; display: block; text-align: center; margin-bottom: 14px;
  animation: pulse-icon 3s ease-in-out infinite;
}
@keyframes pulse-icon {
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 15px rgba(66,165,245,.4))}
  50%{transform:scale(1.06);filter:drop-shadow(0 0 30px rgba(66,165,245,.9))}
}
.start-card h1 {
  font-family: 'Playfair Display', serif; font-size: 2.2em; font-weight: 900;
  color: #fff; text-align: center; margin-bottom: 6px;
}
.subtitle { text-align: center; color: var(--blue-light); font-size: .95em; margin-bottom: 28px; opacity: .85; }
.section-label { color: #94a3b8; font-size: .8em; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.filter-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
.filter-btn {
  padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: .85em; font-weight: 500;
  transition: all .2s; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15); color: #94a3b8;
}
.filter-btn:hover { border-color: var(--blue-light); color: var(--blue-light); background: rgba(66,165,245,.08); }
.filter-btn.active {
  background: linear-gradient(135deg,rgba(21,101,192,.5),rgba(66,165,245,.2));
  border-color: var(--blue-light); color: var(--blue-light); box-shadow: 0 0 14px rgba(66,165,245,.2);
}
.start-info { color: #64748b; font-size: .9em; text-align: center; margin-bottom: 22px; }
.start-info span { color: var(--blue-light); font-weight: 700; }
.btn-start {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--blue), #1976d2);
  color: #fff; font-size: 1.1em; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all .25s; box-shadow: 0 8px 30px rgba(21,101,192,.5);
}
.btn-start:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(21,101,192,.65); }
.by-line { text-align:center; color:#334155; font-size:.8em; letter-spacing:2px; margin-top:18px; font-weight:600; }
.by-line span { color: var(--blue-light); }

#quizWrapper { display: none; padding-top: 75px; position: relative; z-index: 1; }

.q-card {
  max-width: 820px; margin: 18px auto; padding: 28px 32px;
  background: rgba(255,255,255,0.97); border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,.3);
  border-left: 5px solid rgba(21,101,192,0.3);
  transition: border-color .35s; animation: slideIn .35s ease both;
}
@keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.q-card.answered-correct { border-left-color: var(--green); }
.q-card.answered-wrong   { border-left-color: var(--red); }

.q-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.q-num {
  background: linear-gradient(135deg, var(--blue), #1976d2);
  color: #fff; min-width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .85em; flex-shrink: 0;
}
.cat-tag {
  background: linear-gradient(135deg,#1565c0,#1976d2);
  color: #fff; padding: 3px 12px; border-radius: 20px; font-size: .72em; font-weight: 600;
}
.tf-tag {
  background: linear-gradient(135deg,#f9a825,#fbc02d);
  color: #1a1a1a; padding: 3px 12px; border-radius: 20px; font-size: .72em; font-weight: 600;
}
.q-text { font-size: 1.06em; font-weight: 600; color: #0f172a; line-height: 1.6; margin-bottom: 18px; }

.opts { display: flex; flex-direction: column; gap: 9px; }
.opt {
  padding: 12px 18px; border: 2px solid #e2e8f0; border-radius: 12px;
  cursor: pointer; font-size: .96em; text-align: left;
  background: #fff; color: #334155; transition: all .18s;
  font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 10px;
  width: 100%;
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 50%;
  background: #f1f5f9; border: 2px solid #cbd5e1;
  display: flex; align-items: center; justify-content: center;
  font-size: .8em; font-weight: 700; color: #64748b; flex-shrink: 0; transition: all .18s;
}
.opt:hover:not(:disabled) { border-color: var(--blue); background: #eff6ff; transform: translateX(5px); }
.opt:hover:not(:disabled) .opt-letter { background: var(--blue); border-color: var(--blue); color: #fff; }
.opt.correct { border-color: var(--green); background: #f0fdf4; color: #065f46; font-weight: 600; }
.opt.correct .opt-letter { background: var(--green); border-color: var(--green); color: #fff; }
.opt.wrong   { border-color: var(--red); background: #fef2f2; color: #7f1d1d; }
.opt.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #fff; }
.opt:disabled { cursor: default; }

.q-feedback { margin-top: 14px; padding: 12px 16px; border-radius: 12px; font-size: .88em; line-height: 1.6; display: none; }
.q-feedback.correct { background: #f0fdf4; border-left: 4px solid var(--green); color: #065f46; }
.q-feedback.wrong   { background: #fef2f2; border-left: 4px solid var(--red); color: #7f1d1d; }

.submit-wrap { max-width: 820px; margin: 24px auto; text-align: center; padding: 0 20px; }
.btn-submit {
  padding: 16px 70px; border: none; border-radius: 14px;
  background: linear-gradient(135deg,var(--blue),#1976d2);
  color: #fff; font-size: 1.1em; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all .2s; box-shadow: 0 8px 30px rgba(21,101,192,.5);
}
.btn-submit:hover { transform: translateY(-3px); }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; transform: none; }

#resultsBox {
  max-width: 820px; margin: 24px auto; padding: 40px;
  background: rgba(255,255,255,.97); border-radius: 24px;
  text-align: center; display: none;
  box-shadow: 0 30px 80px rgba(0,0,0,.4); animation: slideIn .4s ease;
}
#resultsBox h2 { font-family: 'Playfair Display', serif; color: var(--navy); font-size: 2em; margin-bottom: 8px; }
.score-ring { width: 160px; height: 160px; margin: 20px auto; position: relative; }
.score-ring svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: #e2e8f0; stroke-width: 12; }
.ring-fg { fill: none; stroke: url(#ringGrad); stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }
.score-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-center .big   { font-size: 2.4em; font-weight: 900; color: var(--navy); font-family: 'Playfair Display', serif; }
.score-center .small { font-size: .8em; color: #64748b; }
.result-msg { font-size: 1.05em; color: #475569; margin: 10px 0 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
.stat-card  { border-radius: 16px; padding: 16px 10px; }
.stat-card.c { background: #f0fdf4; border: 2px solid #10b981; }
.stat-card.w { background: #fef2f2; border: 2px solid #ef4444; }
.stat-card.p { background: #fffbeb; border: 2px solid #f9a825; }
.stat-card .num { font-size: 2em; font-weight: 900; font-family: 'Playfair Display', serif; }
.stat-card.c .num { color: #10b981; }
.stat-card.w .num { color: #ef4444; }
.stat-card.p .num { color: #f9a825; }
.stat-card .lbl { font-size: .8em; color: #64748b; margin-top: 4px; }
.btn-re, .btn-home {
  width: 100%; padding: 14px; border: none; border-radius: 14px;
  font-size: 1.05em; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; margin-bottom: 10px; transition: all .2s;
}
.btn-re   { background: linear-gradient(135deg,var(--blue),#1976d2); color: #fff; }
.btn-home { background: #f1f5f9; color: #475569; }
.btn-re:hover   { transform: translateY(-2px); }
.btn-home:hover { background: #e2e8f0; }
.review-section { text-align: left; margin-top: 24px; }
.review-section h3 { color: var(--navy); font-size: 1.1em; margin-bottom: 14px; font-family: 'Playfair Display', serif; }
.rev-item { padding: 14px 16px; border-radius: 12px; margin-bottom: 10px; font-size: .88em; line-height: 1.6; }
.rev-item.wrong { background: #fef2f2; border-left: 4px solid var(--red); }
.rev-item .rt   { font-weight: 700; margin-bottom: 5px; color: #1e293b; }
.rev-item .exp  { color: #64748b; font-size: .9em; margin-top: 5px; }
.rev-item .exp-ar { color: #1e3a5f; font-size: .9em; margin-top: 3px; font-weight: 600; direction: rtl; text-align: right; font-family: 'Segoe UI', Tahoma, sans-serif; }

@media(max-width:600px){
  .start-card{padding:28px 22px}
  .start-card h1{font-size:1.7em}
  .q-card{padding:20px 18px;margin:14px 12px}
  #resultsBox{padding:28px 20px}
}
.q-ar { display:block; font-size:.88em; color:#1565c0; font-weight:500; margin-top:4px; direction:rtl; text-align:right; font-family:'Segoe UI',Tahoma,sans-serif; }
.opt span { display:flex; flex-direction:column; }
.opt-ar { font-size:.82em; color:#1565c0; direction:rtl; text-align:right; font-family:'Segoe UI',Tahoma,sans-serif; font-weight:400; }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="sticky" id="stickyBar" style="display:none">
  <div class="sticky-inner">
    <div class="pill pill-q" id="sNum">0/0</div>
    <div class="pill pill-c" id="sC">✅ 0</div>
    <div class="pill pill-w" id="sW">❌ 0</div>
    <div class="pill pill-p" id="sP">📊 0%</div>
    <div class="prog-wrap"><div class="prog-fill" id="sFill" style="width:0%"></div></div>
  </div>
</div>

<div id="startScreen">
  <div class="start-card">
    <span class="cross-icon">⚛️</span>
    <h1>Applied Physics Quiz</h1>
    <p class="subtitle">Mechanics · Elasticity · Fluid Physics · 20 Questions</p>
    <p class="section-label">اختر الموضوع</p>
    <div class="filter-group">
      <button class="filter-btn active" onclick="selectCat('all',this)">📚 الكل (20)</button>
      <button class="filter-btn" onclick="selectCat('mcq',this)">🔵 MCQ (15)</button>
      <button class="filter-btn" onclick="selectCat('tf',this)">✅ True / False (5)</button>
    </div>
    <p class="start-info">عدد الأسئلة: <span id="qCount">20</span> سؤال</p>
    <button class="btn-start" onclick="startQuiz()">ابدأ الاختبار ▶</button>
    <div class="by-line">BY <span>MOSTAFA SALLAM</span></div>
  </div>
</div>

<div id="quizWrapper">
  <div id="cardsContainer"></div>
  <div class="submit-wrap">
    <button class="btn-submit" id="submitBtn" onclick="showResults()" disabled>عرض النتيجة 🎯</button>
  </div>
  <div id="resultsBox">
    <h2>🎉 انتهى الاختبار!</h2>
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1565c0"/>
            <stop offset="100%" stop-color="#42a5f5"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="80" cy="80" r="64"/>
        <circle class="ring-fg" id="ringFg" cx="80" cy="80" r="64" stroke-dasharray="402" stroke-dashoffset="402"/>
      </svg>
      <div class="score-center">
        <span class="big" id="rScore">0</span>
        <span class="small">من <span id="rTotal">0</span></span>
      </div>
    </div>
    <div class="result-msg" id="rMsg"></div>
    <div class="stats-grid">
      <div class="stat-card c"><div class="num" id="rC">0</div><div class="lbl">✅ صح</div></div>
      <div class="stat-card w"><div class="num" id="rW">0</div><div class="lbl">❌ غلط</div></div>
      <div class="stat-card p"><div class="num" id="rP">0%</div><div class="lbl">📊 النسبة</div></div>
    </div>
    <button class="btn-re"   onclick="startQuiz()">🔄 إعادة الاختبار</button>
    <button class="btn-home" onclick="goHome()">🏠 الرئيسية</button>
    <div class="review-section" id="reviewDiv"></div>
  </div>
</div>

<script>
const LETTERS = ['A','B','C','D'];

const CAT_LABELS = {
  mcq: '🔵 MCQ',
  tf:  '✅ True / False'
};

const ALL = [
  {n:1, cat:'mcq',
   q:"The dimension formula of acceleration (a) is:",
   opts:["L² T","M L T","M L T²","M⁰ L T⁻²"], c:3,
   exp:"Acceleration = velocity/time = (L/T)/T = L·T⁻². Mass is not involved, so M⁰.",
   exp_ar:"التسارع = سرعة/زمن = (L/T)/T = L·T⁻². الكتلة غير موجودة فتُكتب M⁰، والصيغة الأبعادية: M⁰LT⁻²."},

  {n:2, cat:'mcq',
   q:"Fundamental units of SI system are:",
   opts:["Meter - Kilogram - Second","Meter - Kilogram - Minute","Meter - Gram - Second","Foot - Kilogram - Second"], c:0,
   exp:"The SI base units for length, mass, and time are: Meter, Kilogram, and Second.",
   exp_ar:"الوحدات الأساسية في النظام الدولي (SI) هي: المتر للطول، الكيلوجرام للكتلة، والثانية للزمن."},

  {n:3, cat:'mcq',
   q:"The prefix for powers of ten (n) = 10⁻⁹ is:",
   opts:["10¹²","10⁹","10⁻¹²","10⁻⁹"], c:3,
   exp:"The prefix 'nano' represents 10⁻⁹. Example: 1 nanometer = 10⁻⁹ meters.",
   exp_ar:"البادئة 'نانو' تمثل 10⁻⁹. مثال: نانومتر = 10⁻⁹ متر. (بيكو = 10⁻¹²، ميجا = 10⁶، جيجا = 10⁹)."},

  {n:4, cat:'mcq',
   q:"...... is the ability of a material to resist a distorting influence and to return to its original size and shape.",
   opts:["Viscosity / اللزوجة","Density / الكثافة","Elasticity / المرونة","Stiffness / الصلابة"], c:2,
   exp:"Elasticity is the property of a material to return to its original shape after deformation.",
   exp_ar:"المرونة (Elasticity) هي قدرة المادة على مقاومة التشوه والعودة لشكلها وحجمها الأصلي بعد إزالة القوة."},

  {n:5, cat:'mcq',
   q:"A block of iron is sliding across a horizontal floor. The friction causes shear deformation. The relationship between stress and strain in this case is known as:",
   opts:["Young's modulus","Shear modulus","Bulk modulus","None of these"], c:1,
   exp:"Shear modulus (G) describes the relationship between shear stress and shear strain when a force acts parallel to a surface.",
   exp_ar:"معامل القص (Shear Modulus) يصف العلاقة بين إجهاد القص وانفعال القص، وهو ينطبق عندما تكون القوة موازية للسطح كما في الاحتكاك."},

  {n:6, cat:'mcq',
   q:"...... measures the resistance of solids or liquids to changes in their volume.",
   opts:["Young's modulus","Shear modulus","Bulk modulus","None of these"], c:2,
   exp:"Bulk modulus (K) measures a material's resistance to uniform compression (volume change).",
   exp_ar:"معامل الانضغاط (Bulk Modulus) يقيس مقاومة المادة الصلبة أو السائلة للتغير في حجمها تحت ضغط منتظم من جميع الاتجاهات."},

  {n:7, cat:'mcq',
   q:"Young's modulus for the material whose stress-strain curve is shown: (Elastic limit ≈ 300 MPa at strain ≈ 0.003)",
   opts:["10⁵","10⁴","10³","None of the above"], c:0,
   exp:"E = Stress / Strain = 300 MPa / 0.003 = 100,000 MPa = 10⁵ MPa.",
   exp_ar:"معامل يونج = الإجهاد ÷ الانفعال = 300 ميجاباسكال ÷ 0.003 = 100,000 = 10⁵ ميجاباسكال. نقرأ القيم من المنطقة المرنة في الرسم."},

  {n:8, cat:'mcq',
   q:"A spacecraft carries a steel sphere to a planet with much higher atmospheric pressure, causing the sphere's radius to decrease. The modulus used to describe stress-strain for this case is:",
   opts:["Young's modulus","Shear modulus","Bulk modulus","None of the above"], c:2,
   exp:"Bulk modulus applies when pressure acts equally from all sides causing a volume change — exactly like uniform atmospheric pressure on a sphere.",
   exp_ar:"معامل الانضغاط (Bulk Modulus) هو الصحيح هنا لأن الضغط الجوي يعمل من كل الاتجاهات مسبباً تغييراً في الحجم (وليس في الشكل فقط)."},

  {n:9, cat:'mcq',
   q:"......... has neither a definite volume nor a definite shape.",
   opts:["Liquid / سائل","Solid / صلب","Fluid / موائع","Gas / غاز"], c:3,
   exp:"Gas has no definite shape and no definite volume — it expands to fill any container.",
   exp_ar:"الغاز ليس له شكل محدد ولا حجم محدد، فهو يتمدد ليملأ أي وعاء يوضع فيه. السائل له حجم محدد لكن بدون شكل محدد."},

  {n:10, cat:'mcq',
   q:"...... states that 'The magnitude of the buoyant force on an object always equals the weight of the fluid displaced by the object'.",
   opts:["Kirchhoff's law","Pascal's law","Archimedes's law","Newton's law"], c:2,
   exp:"Archimedes' principle: the buoyant force equals the weight of the displaced fluid.",
   exp_ar:"مبدأ أرخميدس: قوة الطفو تساوي وزن السائل المزاح. هذا يفسر لماذا تطفو الأجسام أو تغوص."},

  {n:11, cat:'mcq',
   q:"......... is defined to be the pressure equivalent of a column of mercury that is exactly 0.76 m in height at 0°C.",
   opts:["Fluid pressure","Gauge pressure","Atmosphere pressure","All the above"], c:2,
   exp:"1 atmosphere = pressure of a 0.76 m (76 cm) mercury column at 0°C = 101,325 Pa.",
   exp_ar:"الضغط الجوي (Atmospheric Pressure) يُعرَّف بأنه مساوٍ لضغط عمود زئبق ارتفاعه 0.76 متر عند 0 درجة مئوية = 101,325 باسكال."},

  {n:12, cat:'mcq',
   q:"...... means that the surface of the liquid behaves like a membrane under tension.",
   opts:["Viscosity / اللزوجة","Density / الكثافة","Elasticity / المرونة","Surface tension / التوتر السطحي"], c:3,
   exp:"Surface tension is the property that makes the liquid surface behave like a stretched elastic membrane.",
   exp_ar:"التوتر السطحي (Surface Tension) يجعل سطح السائل يتصرف كغشاء مشدود، مما يسمح لبعض الحشرات بالسير على الماء."},

  {n:13, cat:'mcq',

let selCat='all', questions=[], answered=0, score=0, wrong=0;

function selectCat(cat, btn) {
  selCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const n = cat==='all' ? ALL.length : ALL.filter(q=>q.cat===cat).length;
  document.getElementById('qCount').textContent = n;
}

function startQuiz() {
  questions = selCat==='all' ? [...ALL] : ALL.filter(q=>q.cat===selCat);
  answered=0; score=0; wrong=0;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('resultsBox').style.display='none';
  document.getElementById('quizWrapper').style.display='block';
  document.getElementById('stickyBar').style.display='block';
  updateSticky();
  renderCards();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className='q-card'; card.id='card-'+i;
    card.style.animationDelay = Math.min(i*0.04, 0.8)+'s';

    const optsHtml = q.opts.map((opt, oi) => {
      const parts = opt.split(' / ');
      const enPart = parts[0];
      const arPart = parts.length > 1 ? `<span class="opt-ar">${parts.slice(1).join(' / ')}</span>` : '';
      return `
      <button class="opt" data-orig="${oi}" onclick="checkAns(${i},${oi},${q.c})">
        <div class="opt-letter">${LETTERS[oi]||oi}</div>
        <span>${enPart}${arPart}</span>
      </button>`;
    }).join('');

    const tagClass = q.cat === 'tf' ? 'tf-tag' : 'cat-tag';
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">Q${q.n}</div>
        <div class="${tagClass}">${CAT_LABELS[q.cat]||q.cat}</div>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="opts-${i}">${optsHtml}</div>
      <div class="q-feedback" id="fb-${i}"></div>`;
    container.appendChild(card);
  });
  document.getElementById('submitBtn').disabled = true;
}

function checkAns(qIdx, chosen, correct) {
  const optsDiv = document.getElementById('opts-'+qIdx);
  if(optsDiv.querySelector('.correct,.wrong')) return;
  const isOk = parseInt(chosen)===parseInt(correct);
  Array.from(optsDiv.querySelectorAll('.opt')).forEach(btn=>{
    btn.disabled=true;
    if(parseInt(btn.dataset.orig)===parseInt(correct)) btn.classList.add('correct');
    else if(parseInt(btn.dataset.orig)===parseInt(chosen)&&!isOk) btn.classList.add('wrong');
  });
  const fb = document.getElementById('fb-'+qIdx);
  fb.style.display='block';
  fb.className='q-feedback '+(isOk?'correct':'wrong');
  const q = questions[qIdx];
  fb.innerHTML = (isOk ? '✅ صح! ' : '❌ غلط. ') +
    (q.exp_ar ? '<span style="display:block;font-weight:600;margin-bottom:4px;direction:rtl;text-align:right;font-family:Segoe UI,Tahoma,sans-serif;">' + q.exp_ar + '</span>' : '') +
    (q.exp    ? '<span style="display:block;font-size:.92em;color:#475569;margin-top:2px;">' + q.exp + '</span>' : '');
  document.getElementById('card-'+qIdx).classList.add(isOk?'answered-correct':'answered-wrong');
  if(isOk) score++; else wrong++;
  answered++;
  updateSticky();
  if(answered===questions.length){
    document.getElementById('submitBtn').disabled=false;
    setTimeout(()=>document.getElementById('submitBtn').scrollIntoView({behavior:'smooth',block:'center'}),400);
  }
}

function updateSticky() {
  const total=questions.length, done=score+wrong;
  const pct=done>0?Math.round(score/done*100):0;
  document.getElementById('sNum').textContent=`${answered}/${total} أجبت`;
  document.getElementById('sC').textContent=`✅ ${score}`;
  document.getElementById('sW').textContent=`❌ ${wrong}`;
  document.getElementById('sP').textContent=`📊 ${pct}%`;
  document.getElementById('sFill').style.width=(total>0?Math.round(answered/total*100):0)+'%';
}

function showResults() {
  const total=questions.length, pct=Math.round(score/total*100);
  document.getElementById('rScore').textContent=score;
  document.getElementById('rTotal').textContent=total;
  document.getElementById('rC').textContent=score;
  document.getElementById('rW').textContent=wrong;
  document.getElementById('rP').textContent=pct+'%';
  setTimeout(()=>{ document.getElementById('ringFg').style.strokeDashoffset=402-(402*pct/100); },100);
  document.getElementById('rMsg').textContent=
    pct>=90?'🌟 Excellent! عبقري فيزيا!':
    pct>=75?'👏 Very Good! شغل جامد، كمّل!':
    pct>=60?'👍 Good! راجع الغلط وحاول تاني!':'📚 الفيزيا محتاج مراجعة، إنت قادر!';
  const rev=document.getElementById('reviewDiv');
  rev.innerHTML='<h3>📋 مراجعة الإجابات الغلط</h3>';
  let hasWrong=false;
  questions.forEach((q,i)=>{
    const card=document.getElementById('card-'+i);
    if(card&&card.classList.contains('answered-wrong')){
      hasWrong=true;
      rev.innerHTML+=`<div class="rev-item wrong">
        <div class="rt">❌ Q${q.n}: ${q.q}</div>
        <div>✅ الإجابة الصحيحة: <strong>${q.opts[q.c]}</strong></div>
        <div class="exp-ar">${q.exp_ar||""}</div>
        <div class="exp">${q.exp}</div>
      </div>`;
    }
  });
  if(!hasWrong) rev.innerHTML='<p style="color:#10b981;text-align:center;padding:24px;font-size:1.1em;">🎉 كل إجاباتك صح! ممتاز!</p>';
  document.getElementById('resultsBox').style.display='block';
  document.getElementById('resultsBox').scrollIntoView({behavior:'smooth'});
}

function goHome() {
  document.getElementById('quizWrapper').style.display='none';
  document.getElementById('stickyBar').style.display='none';
  document.getElementById('startScreen').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
